<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrdApp — Kite Orders</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #16213e; border-radius: 12px; padding: 24px; max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h2 { color: #e94560; margin-bottom: 16px; font-size: 18px; }
        .order-card { background: #0f3460; border-radius: 8px; padding: 14px; margin-bottom: 12px; border-left: 4px solid #555; }
        .order-card.buy { border-left-color: #00c853; }
        .order-card.sell { border-left-color: #ff1744; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .order-symbol { font-size: 16px; font-weight: 700; }
        .order-side { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
        .order-side.buy { background: #00c85330; color: #00c853; }
        .order-side.sell { background: #ff174430; color: #ff1744; }
        .order-details { display: flex; gap: 16px; font-size: 13px; color: #aaa; }
        .order-details span { color: #e0e0e0; font-weight: 600; }
        .divider { border: none; border-top: 1px solid #1a1a2e; margin: 4px 0; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-loading { background: #555; color: #999; cursor: wait; }
        .note { margin-top: 14px; font-size: 11px; color: #666; text-align: center; }
        .error { color: #ff1744; text-align: center; padding: 20px; }
        .count { color: #888; font-size: 14px; font-weight: 400; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <h2>TrdApp Orders</h2>
        <div id="content"><p class="error">Loading...</p></div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const apiKey = params.get('api_key');
            const dataStr = params.get('data');

            if (!apiKey || !dataStr) {
                const status = params.get('status');
                if (status === 'success') {
                    document.getElementById('content').innerHTML =
                        '<p style="color:#00c853;text-align:center;padding:20px;font-size:18px;">Orders sent to Kite!</p>' +
                        '<p class="note">Check your Kite app for order status.</p>';
                } else if (status) {
                    document.getElementById('content').innerHTML =
                        '<p style="color:#ff9800;text-align:center;padding:20px;">Orders were cancelled or failed.</p>' +
                        '<p class="note">Go back to Telegram to retry.</p>';
                } else {
                    document.getElementById('content').innerHTML =
                        '<p style="color:#00c853;text-align:center;padding:20px;font-size:18px;">Orders submitted!</p>' +
                        '<p class="note">Check your Kite app for order status. You can close this tab.</p>';
                }
                return;
            }

            let orders;
            try {
                orders = JSON.parse(dataStr);
            } catch(e) {
                document.getElementById('content').innerHTML = '<p class="error">Invalid order data.</p>';
                return;
            }

            if (!orders.length) {
                document.getElementById('content').innerHTML = '<p class="error">No orders in basket.</p>';
                return;
            }

            // Render all orders
            let html = '';
            const buys = orders.filter(o => o.transaction_type === 'BUY');
            const sells = orders.filter(o => o.transaction_type === 'SELL');

            if (sells.length) {
                html += `<p style="color:#ff1744;font-size:12px;font-weight:600;margin-bottom:8px;">SELL <span class="count">(${sells.length})</span></p>`;
                for (const order of sells) {
                    html += `<div class="order-card sell">`;
                    html += `<div class="order-header"><span class="order-symbol">${order.tradingsymbol}</span><span class="order-side sell">SELL</span></div>`;
                    html += `<div class="order-details">Qty: <span>${order.quantity}</span>&nbsp;&nbsp;Type: <span>${order.order_type}</span>&nbsp;&nbsp;${order.product}</div>`;
                    html += `</div>`;
                }
            }

            if (buys.length) {
                html += `<p style="color:#00c853;font-size:12px;font-weight:600;margin-bottom:8px;">BUY <span class="count">(${buys.length})</span></p>`;
                for (const order of buys) {
                    html += `<div class="order-card buy">`;
                    html += `<div class="order-header"><span class="order-symbol">${order.tradingsymbol}</span><span class="order-side buy">BUY</span></div>`;
                    html += `<div class="order-details">Qty: <span>${order.quantity}</span>&nbsp;&nbsp;Type: <span>${order.order_type}</span>&nbsp;&nbsp;${order.product}</div>`;
                    html += `</div>`;
                }
            }

            html += `<button class="btn btn-primary" id="submitBtn" onclick="submitOrder()">Send ${orders.length} order${orders.length > 1 ? 's' : ''} to Kite</button>`;
            html += '<p class="note">Opens Kite with pre-filled basket. Login if prompted.</p>';

            document.getElementById('content').innerHTML = html;

            // Hidden form for POST submission
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://kite.zerodha.com/connect/basket';
            form.style.display = 'none';

            const keyInput = document.createElement('input');
            keyInput.name = 'api_key';
            keyInput.value = apiKey;
            form.appendChild(keyInput);

            const dataInput = document.createElement('input');
            dataInput.name = 'data';
            dataInput.value = dataStr;
            form.appendChild(dataInput);

            document.body.appendChild(form);

            window.submitOrder = function() {
                const btn = document.getElementById('submitBtn');
                btn.className = 'btn btn-loading';
                btn.textContent = 'Opening Kite...';
                btn.disabled = true;
                form.submit();
            };
        })();
    </script>
</body>
</html>
